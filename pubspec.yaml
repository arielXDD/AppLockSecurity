name: app_hider
description: "Bóveda de Aplicaciones - App disfrazada de calculadora para ocultar apps."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Estado
  provider: ^6.1.2

  # Almacenamiento seguro
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # Biometría
  local_auth: ^2.3.0

  # URLs / Deep Links
  url_launcher: ^6.3.1
  app_links: ^6.4.0

  # Cámara (captura de intrusos)
  camera: ^0.11.0+2

  # Tipografía
  google_fonts: ^6.2.1

  # Permisos
  permission_handler: ^11.3.1

  # Cifrado
  encrypt: ^5.0.3
  pointycastle: ^3.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - logo_app.png
